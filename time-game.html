<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Team Match Manager</title>
    <style>
        :root {
            --red: #ff4b2b; --blue: #007aff; --yellow: #ffcc00; --green: #4cd964;
            --dark: #1c1c1e; --light: #f2f2f7;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--light);
            margin: 0; padding: 20px;
            user-select: none; /* 誤操作防止 */
        }
        /* ストップウォッチ */
        .timer-section {
            background: white; border-radius: 15px; padding: 20px;
            text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        #display { font-size: 48px; font-weight: bold; margin-bottom: 15px; font-variant-numeric: tabular-nums; }
        .controls button {
            font-size: 18px; padding: 12px 24px; border-radius: 10px; border: none;
            margin: 5px; color: white; font-weight: bold;
        }
        .btn-start { background-color: var(--green); }
        .btn-stop { background-color: var(--red); }
        .btn-clear { background-color: #8e8e93; }

        /* チーム選択 */
        .team-selection {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px;
        }
        .team-btn {
            padding: 15px; border: none; border-radius: 12px; color: white; font-weight: bold; font-size: 16px;
        }
        .team-red { background-color: var(--red); }
        .team-blue { background-color: var(--blue); }
        .team-yellow { background-color: var(--yellow); color: black; }
        .team-green { background-color: var(--green); }

        /* 対戦表テーブル */
        table {
            width: 100%; border-collapse: separate; border-spacing: 0 8px; margin-top: 10px;
        }
        th { background: #e5e5ea; padding: 10px; font-size: 14px; }
        td { background: white; text-align: center; padding: 12px 5px; border-top: 1px solid #ddd; border-bottom: 1px solid #ddd; }
        .btn-try {
            background: #007aff; color: white; border: none; padding: 8px 12px; border-radius: 6px; font-size: 12px;
        }
        .score-val { font-size: 20px; font-weight: bold; width: 30px; display: inline-block; }
        .team-label { color: white; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <div class="timer-section">
        <div id="display">00:00.0</div>
        <div class="controls">
            <button class="btn-start" onclick="startTimer()">START</button>
            <button class="btn-stop" onclick="stopTimer()">STOP</button>
            <button class="btn-clear" onclick="resetTimer()">CLEAR</button>
        </div>
    </div>

    <div class="team-selection">
        <button class="team-btn team-red" onclick="addTeam('赤', '#ff4b2b')">赤チーム追加</button>
        <button class="team-btn team-blue" onclick="addTeam('青', '#007aff')">青チーム追加</button>
        <button class="team-btn team-yellow" onclick="addTeam('黄', '#ffcc00')">黄チーム追加</button>
        <button class="team-btn team-green" onclick="addTeam('緑', '#4cd964')">緑チーム追加</button>
    </div>

    <div id="match-container">
        <table id="matchTable">
            <thead>
                <tr>
                    <th colspan="2">得点</th>
                    <th>チーム</th>
                    <th>チーム</th>
                    <th colspan="2">得点</th>
                </tr>
            </thead>
            <tbody id="matchBody">
                </tbody>
        </table>
    </div>

    <script>
        // --- ストップウォッチ処理 ---
        let startTime, elapsedTime = 0, timerInterval;
        function updateTime() {
            const time = new Date(Date.now() - startTime + elapsedTime);
            const m = String(time.getMinutes()).padStart(2, '0');
            const s = String(time.getSeconds()).padStart(2, '0');
            const ms = String(Math.floor(time.getMilliseconds() / 100));
            document.getElementById('display').innerText = `${m}:${s}.${ms}`;
        }
        function startTimer() {
            if (!timerInterval) {
                startTime = Date.now();
                timerInterval = setInterval(updateTime, 100);
            }
        }
        function stopTimer() {
            if (timerInterval) {
                elapsedTime += Date.now() - startTime;
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }
        function resetTimer() {
            if (confirm("本当にクリアしますか？")) {
                stopTimer();
                elapsedTime = 0;
                document.getElementById('display').innerText = "00:00.0";
            }
        }

        // --- 試合管理処理 ---
        let teams = [];

        function addTeam(name, color) {
            teams.push({ name, color });
            generateMatches();
        }

        function generateMatches() {
            const tbody = document.getElementById('matchBody');
            tbody.innerHTML = "";
            if (teams.length < 2) return;

            // 総当たりの組み合わせ作成
            for (let i = 0; i < teams.length; i++) {
                for (let j = i + 1; j < teams.length; j++) {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><button class="btn-try" onclick="addScore(this)">トライ</button></td>
                        <td><span class="score-val">0</span></td>
                        <td><span class="team-label" style="background:${teams[i].color}">${teams[i].name}</span></td>
                        <td><span class="team-label" style="background:${teams[j].color}">${teams[j].name}</span></td>
                        <td><span class="score-val">0</span></td>
                        <td><button class="btn-try" onclick="addScore(this)">トライ</button></td>
                    `;
                    tbody.appendChild(row);
                }
            }
        }

        function addScore(btn) {
            const td = btn.parentElement;
            // 1列目なら隣の2列目、6列目なら手前の5列目のスコアを更新
            const scoreSpan = td.cellIndex === 0 ? td.nextElementSibling.querySelector('.score-val') : td.previousElementSibling.querySelector('.score-val');
            scoreSpan.innerText = parseInt(scoreSpan.innerText) + 1;
        }
    </script>
</body>
</html>
